hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath:
  - pkg://verl.trainer.config
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - +rllm.env.env_args.scaffold=continuous_reasoning_window
    - +rllm.agent.agent_args.scaffold=continuous_reasoning_window
    - +rllm.agent.agent_args.use_tool_calling=False
    - +rllm.agent.engine_args.max_workers=16
    - +rllm.agent.engine_args.n_parallel_agents=32
    - +rllm.run.target=eval
    - +rllm.check_format=False
    - +rllm.check_repeating=False
    - +rllm.last_n_reasoning=2
    - rllm.agent.max_steps=50
    - +registry_dataset_name=SWE_Bench_Verified
    - +registry_dataset_split=test
    - data.max_prompt_length=8192
    - data.max_response_length=32768
    - +sampling_params.temperature=0.0
    - +sampling_params.repetition_penalty=1.15
    - +rollout_engine_args.base_url=http://localhost:8083/v1
    - +rollout_engine_args.api_key=sk-xxx
    - +rollout_engine_args.model=/data/lsq/SWE-bench-agent/storage/rl_outputs/sft_step_fillv4_r2e_0_850-filtered-8B-2ep-DAPO-cprw0.2-mcr0.65-fmp-0.5-96step
    - +for_close_source_api.tokenizer=/data/lsq/SWE-bench-agent/storage/rl_outputs/sft_step_fillv4_r2e_0_850-filtered-8B-2ep-DAPO-cprw0.2-mcr0.65-fmp-0.5-96step
  job:
    name: run_deepswe
    chdir: null
    override_dirname: +for_close_source_api.tokenizer=/data/lsq/SWE-bench-agent/storage/rl_outputs/sft_step_fillv4_r2e_0_850-filtered-8B-2ep-DAPO-cprw0.2-mcr0.65-fmp-0.5-96step,+registry_dataset_name=SWE_Bench_Verified,+registry_dataset_split=test,+rllm.agent.agent_args.scaffold=continuous_reasoning_window,+rllm.agent.agent_args.use_tool_calling=False,+rllm.agent.engine_args.max_workers=16,+rllm.agent.engine_args.n_parallel_agents=32,+rllm.check_format=False,+rllm.check_repeating=False,+rllm.env.env_args.scaffold=continuous_reasoning_window,+rllm.last_n_reasoning=2,+rllm.run.target=eval,+rollout_engine_args.api_key=sk-xxx,+rollout_engine_args.base_url=http://localhost:8083/v1,+rollout_engine_args.model=/data/lsq/SWE-bench-agent/storage/rl_outputs/sft_step_fillv4_r2e_0_850-filtered-8B-2ep-DAPO-cprw0.2-mcr0.65-fmp-0.5-96step,+sampling_params.repetition_penalty=1.15,+sampling_params.temperature=0.0,data.max_prompt_length=8192,data.max_response_length=32768,rllm.agent.max_steps=50
    id: ???
    num: ???
    config_name: agent_ppo_trainer
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /data/lsq/tmp/SWE-AGILE/rllm/examples/swe/eval_and_sft
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /data/lsq/tmp/SWE-AGILE/rllm/rllm/trainer/config
      schema: file
      provider: main
    - path: verl.trainer.config
      schema: pkg
      provider: hydra.searchpath in main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /data/lsq/tmp/SWE-AGILE/rllm/examples/swe/eval_and_sft/outputs/2026-02-16/23-51-54
    choices:
      algorithm@algorithm.rollout_correction: rollout_correction
      reward_model: dp_reward_model
      critic: dp_critic
      critic/../engine@critic.model.fsdp_config: fsdp
      critic/../optim@critic.optim: fsdp
      model@actor_rollout_ref.model: hf_model
      rollout@actor_rollout_ref.rollout: rollout
      ref@actor_rollout_ref.ref: dp_ref
      ref/../engine@actor_rollout_ref.ref.fsdp_config: fsdp
      data: legacy_data
      actor@actor_rollout_ref.actor: dp_actor
      actor/../engine@actor_rollout_ref.actor.fsdp_config: fsdp
      actor/../optim@actor_rollout_ref.actor.optim: fsdp
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
