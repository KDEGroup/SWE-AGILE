hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath:
  - pkg://verl.trainer.config
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - model.partial_pretrain=/mnt/82_store/huggingface_cache/hub/models--Qwen--Qwen3-8B/snapshots/b968826d9c46dd6066d109eabc6255188de91218
    - model.trust_remote_code=true
    - model.enable_gradient_checkpointing=true
    - trainer.total_epochs=4
    - use_remove_padding=true
    - ulysses_sequence_parallel_size=8
    - data.train_batch_size=128
    - data.micro_batch_size_per_gpu=8
    - data.max_length=27000
    - data.truncation=right
    - data.multiturn.enable=true
    - data.multiturn.messages_key=messages
    - data.train_files=/mnt/69_store/lsq/SWE-bench-agent/storage/about1987swedev-1357smith-1000rft-ex.parquet
    - data.val_files=default
    - data.rllm.tokenize_and_mask_method=stepwise
    - +data.rllm.reasoning_mode=all
    - trainer.default_local_dir=/mnt/69_store/lsq/SWE-bench-agent/storage/sft_outputs/sft_step_4k-8B-btsz128-lr1e-5-4ep
    - trainer.save_freq=257
    - trainer.test_freq=257
    - trainer.logger=["console", "wandb"]
    - trainer.project_name=SWE-SFT
    - trainer.experiment_name=sft_step_4k-8B-btsz128-lr1e-5-4ep
    - optim.lr=1e-5
  job:
    name: train_swe_sft
    chdir: null
    override_dirname: +data.rllm.reasoning_mode=all,data.max_length=27000,data.micro_batch_size_per_gpu=8,data.multiturn.enable=true,data.multiturn.messages_key=messages,data.rllm.tokenize_and_mask_method=stepwise,data.train_batch_size=128,data.train_files=/mnt/69_store/lsq/SWE-bench-agent/storage/about1987swedev-1357smith-1000rft-ex.parquet,data.truncation=right,data.val_files=default,model.enable_gradient_checkpointing=true,model.partial_pretrain=/mnt/82_store/huggingface_cache/hub/models--Qwen--Qwen3-8B/snapshots/b968826d9c46dd6066d109eabc6255188de91218,model.trust_remote_code=true,optim.lr=1e-5,trainer.default_local_dir=/mnt/69_store/lsq/SWE-bench-agent/storage/sft_outputs/sft_step_4k-8B-btsz128-lr1e-5-4ep,trainer.experiment_name=sft_step_4k-8B-btsz128-lr1e-5-4ep,trainer.logger=["console",
      "wandb"],trainer.project_name=SWE-SFT,trainer.save_freq=257,trainer.test_freq=257,trainer.total_epochs=4,ulysses_sequence_parallel_size=8,use_remove_padding=true
    id: ???
    num: ???
    config_name: agent_sft_trainer
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /data/lsq/tmp/SWE-AGILE/rllm/examples/swe/eval_and_sft
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /data/lsq/tmp/SWE-AGILE/rllm/rllm/trainer/config
      schema: file
      provider: main
    - path: verl.trainer.config
      schema: pkg
      provider: hydra.searchpath in main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /data/lsq/tmp/SWE-AGILE/rllm/examples/swe/eval_and_sft/outputs/2026-03-05/00-39-00
    choices:
      optim: fsdp
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
